background: "#1A1A2E"
configurate_methods:
  - predefined-model
extra:
  python:
    model_sources:
      - models/llm/llm.py
    provider_source: provider/zhipuai_coding.py
help:
  title:
    en_US: Get your API key from ZHIPU AI
    zh_Hans: 从智谱 AI 获取 API Key
  url:
    en_US: https://open.bigmodel.cn/usercenter/apikeys
icon_large:
  en_US: icon_l_en.svg
icon_small:
  en_US: icon_s_en.svg
label:
  en_US: ZHIPU AI Coding
  zh_Hans: 智谱 AI 编码套餐
models:
  llm:
    position: models/llm/_position.yaml
    predefined:
      - models/llm/*.yaml
provider: zhipuai_coding
provider_credential_schema:
  credential_form_schemas:
    - label:
        en_US: API Key
        zh_Hans: API Key
      placeholder:
        en_US: Enter your API Key
        zh_Hans: 在此输入您的 API Key
      required: true
      type: secret-input
      variable: api_key
    - default: https://open.bigmodel.cn/api/coding/paas/v4/
      label:
        en_US: API Endpoint URL
        zh_Hans: API 端点地址
      placeholder:
        en_US: Enter your API Endpoint URL
        zh_Hans: 输入您的 API 端点地址
      required: false
      type: text-input
      variable: base_url
supported_model_types:
  - llm
