model: glm-5
label:
  en_US: glm-5
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: temperature
    use_template: temperature
    default: 1.0
    min: 0.0
    max: 1.0
    help:
      zh_Hans: 采样温度，控制输出的随机性，必须为正数取值范围是：(0.0,1.0]，不能等于 0，默认值为 1.0。值越大，会使输出更随机，更具创造性；值越小，输出会更加稳定或确定。
      en_US: Sampling temperature, controls the randomness of the output. The value range is (0.0,1.0]. The default value is 1.0.
  - name: top_p
    use_template: top_p
    default: 0.95
    help:
      zh_Hans: 用温度取样的另一种方法，称为核取样。取值范围是：(0.0, 1.0) 开区间，不能等于 0 或 1，默认值为 0.95。
      en_US: Another method of temperature sampling is called kernel sampling. The value range is (0.0, 1.0) open interval. The default value is 0.95.
  - name: do_sample
    label:
      zh_Hans: 采样策略
      en_US: Sampling strategy
    type: boolean
    help:
      zh_Hans: do_sample 为 true 时启用采样策略，do_sample 为 false 时采样策略 temperature、top_p 将不生效。默认值为 true。
      en_US: When do_sample is true, sampling strategy is enabled. Default is true.
    default: true
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 131072
  - name: thinking
    label:
      zh_Hans: 推理模式
      en_US: Thinking Mode
    type: boolean
    default: false
    required: false
    help:
      zh_Hans: 控制模型的推理能力。
      en_US: Controls the model's thinking capability.
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: Specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
